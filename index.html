<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Wish</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#6EC6FF,#1E90FF);
  font-family: Arial, sans-serif;
  overflow:hidden;
}

/* floating hearts */
.heart {
  position:absolute;
  color:white;
  animation: floatUp 6s linear infinite;
  opacity:0.7;
}

@keyframes floatUp{
  0%{transform:translateY(100vh) scale(0.5);}
  100%{transform:translateY(-10vh) scale(1.2);}
}

.card{
  background: rgba(255,255,255,0.15);
  padding:30px;
  border-radius:20px;
  text-align:center;
  color:white;
  backdrop-filter: blur(10px);
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  width:300px;
  z-index:2;
}

h1{
  margin-bottom:10px;
}

button{
  margin-top:15px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  color:#1E90FF;
  background:white;
}

button:hover{
  background:#dff2ff;
}

#msg{
  margin-top:15px;
  display:none;
  font-size:14px;
}
</style>
</head>

<body>

<!-- floating hearts -->
<script>
for(let i=0;i<15;i++){
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💙";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=(10+Math.random()*20)+"px";
  h.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(h);
}
</script>

<div class="card">
  <h1>🎉 Happy Birthday 🎉</h1>

  <p>For <b>zar zar sein</b> 💙</p>

  <button onclick="showMsg()">Click Me 🎁</button>

  <div id="msg">
    💙 Wishing you endless happiness, success and love 💙<br><br>
    From: <b>ttgk</b> ✨
  </div>
</div>

<script>
function showMsg(){
  document.getElementById("msg").style.display="block";
}
</script>

</body>
</html># Birthday-wish-for-you
